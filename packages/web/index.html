<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WebAI.js — Web AI Code Generator</title>
  <link rel="stylesheet" href="/src/style.css">
</head>
<body>
  <div id="app">
    <header>
      <div class="header-row">
        <div>
          <h1>WebAI.js</h1>
          <p class="subtitle">Generate browser-based AI inference code</p>
        </div>
        <div class="header-actions">
          <button id="sidebarToggle" class="panel-toggle-btn" title="Toggle sidebar" aria-label="Toggle sidebar">
            <svg class="toggle-icon toggle-collapse" width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="14" height="12" rx="2"/><line x1="7" y1="3" x2="7" y2="15"/><polyline points="12,7 10,9 12,11"/></svg>
            <svg class="toggle-icon toggle-expand" width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="14" height="12" rx="2"/><line x1="7" y1="3" x2="7" y2="15"/><polyline points="10,7 12,9 10,11"/></svg>
          </button>
          <button id="themeToggle" class="theme-toggle" title="Toggle light/dark theme" aria-label="Toggle theme">
            <span class="theme-icon-dark">&#9789;</span>
            <span class="theme-icon-light">&#9788;</span>
          </button>
        </div>
      </div>
    </header>

    <div class="layout">
      <!-- Left: Config Panel -->
      <aside id="configPanel" class="config-panel">
        <!-- Populated by config-panel.ts -->
      </aside>

      <!-- Center: Code Preview -->
      <section class="code-section">
        <div class="code-toolbar">
          <div id="fileTabs" class="file-tabs" role="tablist">
            <!-- Populated by code-preview.ts -->
          </div>
          <div class="toolbar-actions">
            <button id="tryItBtn" class="toolbar-btn" title="Toggle preview panel">Preview</button>
            <button id="codeFullscreenBtn" class="panel-toggle-btn" title="Toggle fullscreen editor" aria-label="Toggle fullscreen editor">
              <svg class="toggle-icon toggle-expand" width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="10,2 14,2 14,6"/><polyline points="6,14 2,14 2,10"/><line x1="14" y1="2" x2="9" y2="7"/><line x1="2" y1="14" x2="7" y2="9"/></svg>
              <svg class="toggle-icon toggle-collapse" width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="4,9 4,13 8,13"/><polyline points="12,7 12,3 8,3"/><line x1="1" y1="15" x2="4" y2="12"/><line x1="15" y1="1" x2="12" y2="4"/></svg>
            </button>
            <button id="copyBtn" class="toolbar-btn" title="Copy current file to clipboard">Copy</button>
            <button id="downloadZipBtn" class="toolbar-btn" title="Download all files as ZIP">Download ZIP</button>
          </div>
        </div>
        <div id="editor" class="editor-container"></div>
      </section>

      <!-- Bottom: Try It -->
      <section id="tryItSection" class="try-it-section">
        <div class="try-it-header">
          <h2>Preview</h2>
          <button id="previewFullscreenBtn" class="panel-toggle-btn" title="Toggle fullscreen preview" aria-label="Toggle fullscreen preview">
            <svg class="toggle-icon toggle-expand" width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="10,2 14,2 14,6"/><polyline points="6,14 2,14 2,10"/><line x1="14" y1="2" x2="9" y2="7"/><line x1="2" y1="14" x2="7" y2="9"/></svg>
            <svg class="toggle-icon toggle-collapse" width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="4,9 4,13 8,13"/><polyline points="12,7 12,3 8,3"/><line x1="1" y1="15" x2="4" y2="12"/><line x1="15" y1="1" x2="12" y2="4"/></svg>
          </button>
          <button id="closeTryIt" class="close-btn" title="Close preview">&times;</button>
        </div>
        <iframe id="tryItFrame" class="try-it-frame" sandbox="allow-scripts allow-same-origin"></iframe>
      </section>
    </div>

    <footer>
      <span>Generated by <a href="https://github.com/ibelem/webai.js">webai.js</a></span>
    </footer>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
